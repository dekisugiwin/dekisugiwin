mixed-port: 7890
redir-port: 7891
tproxy-port: 1536
ipv6: false
mode: Rule
allow-lan: true
disable-keep-alive: false
geodata-mode: false
geo-auto-update: true
geo-update-interval: 24
updatetime: &Time 86400
geox-url:
  asn: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/GeoLite2-ASN.mmdb"
experimental:
  http-headers:
    request:
      - name: "User-Agent"
        value: "Mozilla/5.0 (Linux; Android 10; K) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/135.0.0.0 Mobile Safari/537.36"
      - name: "Accept-Language"
        value: "en-US,en;q=0.9"
unified-delay: true
tcp-concurrent: true
log-level: silent
find-process-mode: always
client-fingerprint: chrome
external-controller: 0.0.0.0:9090
external-ui-url: "https://github.com/Zephyruso/zashboard/releases/latest/download/dist.zip"
external-ui: "./Web/Zash/"
secret: ""
p: &p
  type: http
  interval: *Time
  health-check:
    enable: true
    url: http://www.google.com/generate_204
    interval: 300
  proxy: DIRECT
  headers:
    User-Agent: "FlClash/1.0.0 sing-box/1.10.0"
    Accept: "*/*"
A: &A
  url: "https://www.gstatic.com/generate_204"
  interval: 300
  filter: "^(?!.*(套餐|重置|剩余|到期|群|账户|流量|有效期|失联|余额)).*$"
  use:
    - 1.主要地址
    - 2.备用地址
    - 3.额外地址
All: &All
  type: select
  use:
    - 1.主要地址
    - 2.备用地址
    - 3.额外地址
P1_All: &P1_All
  type: url-test
  url: "https://www.gstatic.com/generate_204"
  interval: 300
  use:
    - 1.主要地址
P2_All: &P2_All
  type: url-test
  url: "https://www.gstatic.com/generate_204"
  interval: 300
  use:
    - 2.备用地址
P3_All: &P3_All
  type: url-test
  url: "https://www.gstatic.com/generate_204"
  interval: 300
  use:
    - 3.额外地址
proxy-providers:
  1.主要地址:
    hidden: true
    <<: *p
    override:
      additional-prefix: "Main："
    path: ./proxies/1.主要地址.yaml
    url: ""
  2.备用地址:
    hidden: true
    <<: *p
    override:
      additional-prefix: "Minor："
    path: ./proxies/2.备用地址.yaml
    url: ""
  3.额外地址:
    hidden: true
    <<: *p
    override:
      additional-prefix: "Additi："
    path: ./proxies/3.额外地址.yaml
    url: ""
profile:
  store-selected: true
  store-fake-ip: true
sniffer:
  enable: true
  force-dns-mapping: true
  parse-pure-ip: true
  override-destination: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
    TLS:
      ports: [443, 5228, 8443]
    QUIC:
      ports: [443, 8443]
  force-domain:
    - "+.v2ex.com"
  skip-domain:
    - "+.io.mi.com"
tun:
  enable: false
  device: Meta
  stack: gvisor
  dns-hijack:
    - any:53
    - tcp://any:53
  udp-timeout: 300
  auto-route: true
  auto-redirect: true
  auto-detect-interface: true
hosts:
  services.googleapis.cn: services.googleapis.com
dns:
  enable: true
  ipv6: false
  listen: 0.0.0.0:1053
  fake-ip-range: 198.18.0.0/16
  enhanced-mode: fake-ip
  fake-ip-filter:
    - "+.lan"
    - "+.local"
    - "geosite:cn"
    - "geosite:private"
  proxy-server-nameserver:
    - https://223.5.5.5/dns-query#🌐 本机·本地直连
    - https://1.12.12.12/dns-query#🌐 本机·本地直连
  nameserver-policy:
    "geosite:cn,private":
      - https://223.5.5.5/dns-query#🌐 本机·本地直连
      - https://1.12.12.12/dns-query#🌐 本机·本地直连
  nameserver:
    - https://8.8.8.8/dns-query#DNS连接
    - https://1.1.1.1/dns-query#DNS连接
  direct-nameserver:
    - 223.5.5.5
    - 1.12.12.12
proxies:
  - { name: 🌐 本机·本地直连, type: direct, udp: true }
  - { name: ⛔️ 禁止·拒绝连接, type: reject }
  - { name: 🌐 DNS_Hijack, type: dns }
proxy_groups: &proxy_groups
  type: select
  proxies:
    - 总模式
    - 延迟最低
